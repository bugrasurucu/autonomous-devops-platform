---
# Terraform + Checkov IaC security scanning
apiVersion: kagent.dev/v1alpha1
kind: ToolServer
metadata:
  name: aws-terraform-tools
  namespace: kagent
spec:
  description: "Terraform code generation and Checkov security scanning"
  transport:
    stdio:
      command: uvx
      args: ["awslabs.terraform-mcp-server@latest"]
      env:
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: aws-credentials
              key: access-key-id
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: aws-credentials
              key: secret-access-key
        - name: AWS_DEFAULT_REGION
          value: "us-east-1"
---
